{% extends 'core/base.html' %}


{% block content %}


<div class="card shadow-sm mb-4">
    <div class="card-body">
        {% if object %}
            <h2 class="card-title mb-3">Edit Customer: {{ object.first_name }} {{ object.last_name }}</h2>
        {% else %}
            <h2 class="card-title mb-3">Create New Customer</h2>
        {% endif %}


        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="mt-3 d-flex gap-2">
                <button type="submit" class="btn btn-success">Save</button>
                <a href="{% url 'customers:list' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>


{% endblock %}
